<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .nav {
            text-align: center;
            margin-bottom: 30px;
        }

        .nav a {
            margin: 0 10px;
            text-decoration: none;
            color: #0077cc;
            font-weight: bold;
        }

        .track-form {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            text-align: center;
        }

        .track-form h2 {
            margin-top: 0;
        }

        .track-form input {
            padding: 10px;
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-right: 10px;
        }

        .track-form button {
            padding: 10px 16px;
            border: none;
            background-color: #0077cc;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .card h2 {
            margin-bottom: 10px;
            font-size: 18px;
            color: #555;
        }

        .card p {
            font-size: 28px;
            font-weight: bold;
            margin: 0;
            color: #222;
        }

        .recent-visits {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .recent-visits h2 {
            margin-top: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <h1>Mini Website Analytics Tracker</h1>

    <div class="nav">
        <a href="/">Dashboard</a>
        <a href="/about">Visit About Page</a>
        <a href="/contact">Visit Contact Page</a>
    </div>

    <div class="track-form">
        <h2>Track Custom Page View</h2>
        <form action="/track" method="post">
            <input type="text" name="pagePath" placeholder="/pricing" required>
            <button type="submit">Track View</button>
        </form>
    </div>

    <div class="dashboard-container">
        <div class="card">
            <h2>Total Views</h2>
            <p th:text="${data.totalViews}"></p>
        </div>

        <div class="card">
            <h2>Views Today</h2>
            <p th:text="${data.viewsToday}"></p>
        </div>

        <div class="card">
            <h2>Main Page Views</h2>
            <p th:text="${data.homeViews}"></p>
        </div>

        <div class="card">
            <h2>About Page Views</h2>
            <p th:text="${data.aboutViews}"></p>
        </div>

        <div class="card">
            <h2>Contact Page Views</h2>
            <p th:text="${data.contactViews}"></p>
        </div>
    </div>

    <div class="recent-visits">
        <h2>Recent Visits</h2>

        <table>
            <thead>
                <tr>
                    <th>Page</th>
                    <th>Viewed At</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="visit : ${data.recentVisits}">
                    <td th:text="${visit.pageName}"></td>
                    <td th:text="${visit.formattedViewedAt}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
